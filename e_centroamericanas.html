<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentación Cattleya</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0906;
  --gold: #d4a84b;
  --gold-dim: #8a6a28;
  --cream: #f2e8d5;
  --orchid: #b06090;
  --orange: #d4622a;
  --text-dim: #7a6a55;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'EB Garamond', serif;
  overflow: hidden;
}

/* FULL SCREEN STAGE */
.presenter {
  width: 100vw;
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SLIDES */
.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1s ease;
}
.slide.active { opacity: 1; z-index: 1; }

.slide img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  transform: scale(1.01);
  transition: transform 6s ease;
}
.slide.active img { transform: scale(1); }

/* Dark vignette overlay */
.slide::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to top,   rgba(10,9,6,0.85) 0%, rgba(10,9,6,0.1) 40%),
    linear-gradient(to right, rgba(10,9,6,0.3)  0%, transparent 30%),
    linear-gradient(to left,  rgba(10,9,6,0.3)  0%, transparent 30%),
    linear-gradient(to bottom,rgba(10,9,6,0.4)  0%, transparent 25%);
  z-index: 1;
}

/* TOP HEADER */
.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 1.5rem 2rem;
}
.genus-title {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.4em;
  color: var(--gold);
  text-transform: uppercase;
  opacity: 0.85;
}

/* SLIDE COUNTER */
.slide-counter {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--text-dim);
}

/* BOTTOM CAPTION */
.caption {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 1rem 2rem 1.5rem;
}
.caption-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.2rem, 3vw, 2rem);
  font-weight: 400;
  color: var(--cream);
  letter-spacing: 0.06em;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}
.caption-type {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(0.85rem, 1.5vw, 1.1rem);
  color: var(--gold);
  letter-spacing: 0.08em;
  margin-top: 0.25rem;
}

/* TIMER BAR */
.timer-track {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(255,255,255,0.08);
  z-index: 20;
}
.timer-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orchid), var(--gold), var(--orange));
  width: 0%;
  transition: width 0.1s linear;
}

/* CONTROLS */
.controls {
  position: fixed;
  bottom: 1.5rem;
  right: 2rem;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.ctrl-btn {
  width: 40px; height: 40px;
  background: rgba(10,9,6,0.6);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(212,168,75,0.25);
  color: var(--cream);
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }
.ctrl-btn.pause { font-size: 0.8rem; }

/* DOTS */
.dots {
  position: fixed;
  bottom: 1.8rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  gap: 0.6rem;
  align-items: center;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(242,232,213,0.25);
  cursor: pointer;
  transition: all 0.3s;
  border: none;
}
.dot.active { background: var(--gold); transform: scale(1.4); }

/* CATEGORY BADGE */
.cat-badge {
  position: fixed;
  top: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  color: rgba(242,232,213,0.5);
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="presenter" id="presenter"></div>

<div class="top-bar">
  <div class="genus-title">Orchidaceae · <em>Cattleya</em></div>
  <div class="slide-counter" id="counter">1 / 4</div>
</div>

<div class="cat-badge" id="catBadge"></div>

<div class="caption" id="caption">
  <div class="caption-name" id="captionName"></div>
  <div class="caption-type" id="captionType"></div>
</div>

<div class="dots" id="dots"></div>

<div class="controls">
  <button class="ctrl-btn" id="btnPrev" title="Anterior">&#8592;</button>
  <button class="ctrl-btn pause" id="btnPause" title="Pausar">⏸</button>
  <button class="ctrl-btn" id="btnNext" title="Siguiente">&#8594;</button>
</div>

<div class="timer-track">
  <div class="timer-fill" id="timerFill"></div>
</div>

];

const INTERVAL = 5000;
let current = 0;
let paused = false;
let timerStart = null;
let elapsed = 0;
let rafId = null;

const presenter = document.getElementById('presenter');
const counterEl = document.getElementById('counter');
const catBadgeEl = document.getElementById('catBadge');
const captionNameEl = document.getElementById('captionName');
const captionTypeEl = document.getElementById('captionType');
const dotsEl = document.getElementById('dots');
const timerFill = document.getElementById('timerFill');
const btnPause = document.getElementById('btnPause');

// Build slides
SLIDES.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  const img = document.createElement('img');
  img.src = s.src;
  img.alt = s.fullname;
  img.loading = i < 2 ? 'eager' : 'lazy';
  div.appendChild(img);
  presenter.appendChild(div);
});

// Build dots
SLIDES.forEach((_, i) => {
  const dot = document.createElement('button');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
});

function updateUI() {
  const s = SLIDES[current];
  counterEl.textContent = (current + 1) + ' / ' + SLIDES.length;
  catBadgeEl.textContent = s.category;
  captionNameEl.textContent = s.fullname;
  captionTypeEl.textContent = s.type;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  document.querySelectorAll('.slide').forEach((d, i) => d.classList.toggle('active', i === current));
}

function goTo(idx) {
  current = (idx + SLIDES.length) % SLIDES.length;
  updateUI();
  resetTimer();
}

// Timer animation
function resetTimer() {
  cancelAnimationFrame(rafId);
  elapsed = 0;
  timerFill.style.transition = 'none';
  timerFill.style.width = '0%';
  if (!paused) startTimer();
}

function startTimer() {
  timerStart = performance.now() - elapsed;
  function tick(now) {
    elapsed = now - timerStart;
    const pct = Math.min(elapsed / INTERVAL * 100, 100);
    timerFill.style.transition = 'none';
    timerFill.style.width = pct + '%';
    if (elapsed >= INTERVAL) {
      goTo(current + 1);
      return;
    }
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.textContent = paused ? '▶' : '⏸';
  btnPause.title = paused ? 'Reanudar' : 'Pausar';
  if (paused) {
    cancelAnimationFrame(rafId);
  } else {
    timerStart = performance.now() - elapsed;
    startTimer();
  }
});

document.getElementById('btnNext').addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  goTo(current - 1);
  if (e.key === 'ArrowRight') goTo(current + 1);
  if (e.key === ' ') { e.preventDefault(); btnPause.click(); }
});

// Swipe
let tx = 0;
presenter.addEventListener('touchstart', e => tx = e.touches[0].clientX);
presenter.addEventListener('touchend', e => {
document.getElementById('btnPrev').addEventListener('click', () => goTo(current - 1));
  const diff = tx - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) goTo(diff > 0 ? current + 1 : current - 1);
});

updateUI();
startTimer();
</script>
